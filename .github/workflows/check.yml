name: MoonBit CI

on:
  push:
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain versions
        run: moon version --all

      - name: Update registry dependencies
        run: moon update

      - name: Check
        run: moon check --deny-warn

      - name: Test
        run: moon test --deny-warn

      - name: Build
        run: moon build

      - name: Run basic example
        run: moon run examples/basic

      - name: Verify fixture directory guard detects breakage
        run: |
          set +e
          moon run cmd/main -- check-dir fixtures/dir_old fixtures/dir_new --breaking-only --format json
          code=$?
          set -e
          test "$code" -eq 1

      - name: Verify formatting
        run: |
          moon fmt
          git diff --exit-code

      - name: Verify public interface files
        run: |
          moon info
          git diff --exit-code
